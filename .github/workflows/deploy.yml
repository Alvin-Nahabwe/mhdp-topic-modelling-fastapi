name: Deploy MHDP API

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Lowercase required — Docker rejects uppercase in image names
  IMAGE_NAME: alvin-nahabwe/mhdp-topic-modelling-fastapi/mhdp-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MODEL_VM_IP }}
          username: inference
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120m
          script_stop: true
          script: |
            echo "${{ secrets.SUDO_PASS }}" | sudo -S echo "Authenticated."

            echo "${{ secrets.SUDO_PASS }}" | sudo -S docker login ghcr.io -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
            echo "${{ secrets.SUDO_PASS }}" | sudo -S docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            mkdir -p ~/mhdp_deployment
            cd ~/mhdp_deployment

            printf 'services:\n  mhdp-api:\n    image: ghcr.io/${{ env.IMAGE_NAME }}:latest\n    container_name: mhdp-api\n    ports:\n      - "8555:8000"\n    restart: always\n' > docker-compose.yml

            echo "${{ secrets.SUDO_PASS }}" | sudo -S docker compose down || true
            echo "${{ secrets.SUDO_PASS }}" | sudo -S docker compose up -d
            echo "${{ secrets.SUDO_PASS }}" | sudo -S docker image prune -f

            sleep 3
            echo "${{ secrets.SUDO_PASS }}" | sudo -S docker ps | grep mhdp-api
