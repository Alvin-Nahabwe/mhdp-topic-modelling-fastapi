name: Secure Tailscale MHDP Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Hardcoded lowercase because Docker strictly rejects uppercase GitHub usernames (e.g., 'Alvin-Nahabwe')
  IMAGE_NAME: alvin-nahabwe/mhdp-topic-modelling-fastapi/mhdp-api
  MODEL_VM_IP: 100.104.98.125
  SUDO_PASS: 4e3w2qmhdp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: tskey-auth-k3n25oM3Sm11CNTRL-6ig7JH1CVxMYse3f58xjxMfkrYKSEgUK

      - name: Stream image to Model VM via Tailscale
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.MODEL_VM_IP }} >> ~/.ssh/known_hosts 2>/dev/null
          
          # Stream the Docker image directly to the VM over SSH (never touches runner disk)
          echo "Streaming Docker image to VM..."
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest | gzip | \
            ssh -o StrictHostKeyChecking=no inference@${{ env.MODEL_VM_IP }} "cat > /tmp/mhdp-api.tar.gz"
          
          # Verify transfer
          ssh -o StrictHostKeyChecking=no inference@${{ env.MODEL_VM_IP }} "ls -lh /tmp/mhdp-api.tar.gz"

      - name: Deploy on Model VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.MODEL_VM_IP }}
          username: inference
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120m
          script_stop: true
          envs: SUDO_PASS,IMAGE_NAME,REGISTRY
          script: |
            echo "${{ env.SUDO_PASS }}" | sudo -S echo "Authenticated Sudo."
            
            # Load the image from the transferred tarball (no internet needed)
            echo "Loading Docker image from tarball..."
            echo "${{ env.SUDO_PASS }}" | sudo -S docker load -i /tmp/mhdp-api.tar.gz
            rm -f /tmp/mhdp-api.tar.gz
            
            # Verify the image was loaded
            echo "${{ env.SUDO_PASS }}" | sudo -S docker images ghcr.io/${{ env.IMAGE_NAME }}:latest
            
            # Create working directory for the deployment
            mkdir -p ~/mhdp_deployment
            cd ~/mhdp_deployment
            
            # Write out Docker Compose
            cat << 'EOF' > docker-compose.yml
            services:
              mhdp-api:
                image: ghcr.io/${{ env.IMAGE_NAME }}:latest
                container_name: mhdp-api
                ports:
                  - "8555:8000"
                restart: always
            EOF
            
            # Restart with the new image
            echo "${{ env.SUDO_PASS }}" | sudo -S docker compose down || true
            echo "${{ env.SUDO_PASS }}" | sudo -S docker compose up -d
            
            # Verify container is running
            sleep 3
            echo "${{ env.SUDO_PASS }}" | sudo -S docker ps | grep mhdp-api
